<!DOCTYPE html>

<head>
    <title>3dbsp</title>
    <style>
        canvas {
            border: 5px solid #000000; /* Adds a visible border to the canvas */
        }
    </style>
</head>
<body>

    <canvas id="myCanvas" width="900" height="700">
        Your browser does not support the HTML canvas tag.
    </canvas>

    <script>

        class Point {
            constructor(x, y, z) {
                this.x = x;
                this.y = y;
                this.z = z;
            }
        }

        class Node {
            constructor(lineid) {
                this.lineid = lineid;
                this.front = null;
                this.back = null;
            }
        }
        class Color {
            constructor(r,g,b) {
                this.r = r;
                this.g = g;
                this.b = b;
            }
        }   

        class Triangle {
            constructor(pt1, pt2, pt3) {
                this.pt1 = pt1;
                this.pt2 = pt2;
                this.pt3 = pt3;
            }
        }
        class Line {
            constructor(pt1,pt2){
                this.pt1=pt1;this.pt2=pt2
            }
        }
        class Matrix {
            constructor(r11, r12, r13, r21, r22, r23, r31, r32, r33) {
                this.r11 = r11;
                this.r12 = r12;
                this.r13 = r13;
                this.r21 = r21;
                this.r22 = r22;
                this.r23 = r23;
                this.r31 = r31;
                this.r32 = r32;
                this.r33 = r33;
            }
        }
        // --- bsp stuff
        function whichside(p,tri_id)    {
            let bx = (p.x-(triangles[tri_id].pt1.x));
            let by = (p.y-(triangles[tri_id].pt1.y));
            let bz = (p.z-(triangles[tri_id].pt1.z));
            return ((nx[tri_id])*bx)+((ny[tri_id])*by)+((nz[tri_id])*bz);
        }
        function Line_vs_Plane(p1, p2, tri_id) {
            let dx = p2.x - p1.x;
            let dy = p2.y - p1.y;
            let dz = p2.z - p1.z;
            let dot = (nx[tri_id] * dx) + (ny[tri_id] * dy) + (nz[tri_id] * dz);
            if (Math.abs(dot) < 0.000001) return null;
                let dist = whichside(p1,tri_id);
                let t = -dist / dot;
                return new Point(
                p1.x + (t * dx),
                p1.y + (t * dy),
                p1.z + (t * dz)
            );
        }
        function calc_normal(tri) {
            let ax = tri.pt2.x - tri.pt1.x;
            let ay = tri.pt2.y - tri.pt1.y;
            let az = tri.pt2.z - tri.pt1.z;
            let bx = tri.pt3.x - tri.pt1.x;
            let by = tri.pt3.y - tri.pt1.y;
            let bz = tri.pt3.z - tri.pt1.z;
            let cnx = ay * bz - az * by;
            let cny = az * bx - ax * bz;
            let cnz = ax * by - ay * bx;
            let length = Math.sqrt(cnx * cnx + cny * cny + cnz * cnz);   
            nx.push (cnx / length);
            ny.push (cny / length);
            nz.push (cnz / length);
        }
        function buildBSP(list) {
            if (list.length === 0) {return}
            let partitionid = new Node(list[0]); /* so i need to do the same thing i did with the other one*/
            let front = []; let back = [];
            for (let i = 1; i < list.length; i++) {
                let tri = triangles[list[i]];
                let temparr = [tri.pt1,tri.pt2,tri.pt3];
                let tfront = temparr.filter(pt => whichside(pt,partitionid.lineid)>0);
                let tback = temparr.filter(pt => whichside(pt,partitionid.lineid)<0);
                if (tback.length===0) {
                    front.push(list[i]);
                } else if (tfront.length===0) {
                    back.push(list[i]);
                } else {
                    
                    if (tback.length===2&&tfront.length===1) {
                        var line2check1 = new Line(tfront[0],tback[0]);
                        var line2check2 = new Line(tfront[0],tback[1]);
                        let pt1 = Line_vs_Plane(line2check1.pt1,line2check1.pt2,partitionid.lineid);
                        let pt2 = Line_vs_Plane(line2check2.pt1,line2check2.pt2,partitionid.lineid);
                        front.push(i);
                        back.push(back.length-1);
                        back.push(back.length-1);
                        triangles.splice(i-1,1,new Triangle(pt1,pt2,tfront[0]));
                        triangles.push(new Triangle(tback[0],tback[1],pt1));
                        triangles.push(new Triangle(tback[1],pt1,pt2));
                    } else if (tback.length===1&&tfront.length===2) {
                        var line2check1 = new Line(tfront[0],tback[0]);
                        var line2check2 = new Line(tfront[1],tback[0]);
                        let pt1 = Line_vs_Plane(line2check1.pt1,line2check1.pt2,partitionid.lineid);
                        let pt2 = Line_vs_Plane(line2check2.pt1,line2check2.pt2,partitionid.lineid);
                        back.push(i);
                        front.push(front.length-1);
                        front.push(front.length-1);
                        triangles.splice(i-1,1,new Triangle(pt1,pt2,tback[0]));
                        triangles.push(new Triangle(tfront[0],tfront[1],pt1));
                        triangles.push(new Triangle(tfront[1],pt1,pt2))
                    } else {
                        
                    }
                }
            }
            partitionid.front = buildBSP(front); partitionid.back = buildBSP(back);
            return partitionid;
        }
        var render_order = [];
        function Traversefrompt(point,node) {
            if (!node) {return}
            if (whichside(point, node.lineid) > 0) {
                Traversefrompt(point,node.back);
                render_order.push(node);
                Traversefrompt(point,node.front);
            } else {
                Traversefrompt(point,node.front);
                render_order.push(node);
                Traversefrompt(point,node.back);
            }
        }
        // end of bsp stuff
        var triangles = [];
        addTriangle = function(pt1,pt2,pt3) {
            triangles.push(new Triangle(pt1, pt2, pt3));
        }
        function Calc_Normals() {
            triangles.forEach((tri) => {
                calc_normal(tri);
            })
        }
        var rgb = [];
        const canvas = document.getElementById("myCanvas");
        const drawingContext = canvas.getContext("2d");
        function Add_Triangle(x1,y1,z1,x2,y2,z2,x3,y3,z3,r,g,b) {
            var p1 = new Point(x1,y1,z1)
            var p2 = new Point(x2,y2,z2)
            var p3 = new Point(x3,y3,z3)
            triangles.push(new Triangle(p1,p2,p3));
            rgb.push(new Color(r,g,b));
        }
        function fill(r, g, b, a = 255) {
            drawingContext.fillStyle = `rgba(${r}, ${g}, ${b}, ${a / 255})`;
        }
        var rotx = 0
        var roty = 0
        function triangle(x1, y1, x2, y2, x3, y3) {
            drawingContext.beginPath();
            drawingContext.moveTo(x1, y1);
            drawingContext.lineTo(x2, y2);
            drawingContext.lineTo(x3, y3);
            drawingContext.closePath();
            drawingContext.fill();
        }
        var draw = function() {
            drawingContext.clearRect(0, 0, canvas.width, canvas.height);
            Traversefrompt(camPos,bsptree);
            MoveCamera()
            SetRotmatrix(Math.cos(rotx),Math.sin(rotx),Math.cos(roty),Math.sin(roty))
            render_order.forEach((node) => {
            let tri = triangles[node.lineid];
            fill(rgb[node.lineid].r, rgb[node.lineid].g, rgb[node.lineid].b);
            var trp1 = new Point(tri.pt1.x-camPos.x,tri.pt1.y-camPos.y,tri.pt1.z-camPos.z);
            var trp2 = new Point(tri.pt2.x-camPos.x,tri.pt2.y-camPos.y,tri.pt2.z-camPos.z);
            var trp3 = new Point(tri.pt3.x-camPos.x,tri.pt3.y-camPos.y,tri.pt3.z-camPos.z); 
            var tp1 = new Point((trp1.x*rotmatrix.r11)+(trp1.z*rotmatrix.r13),(trp1.x*rotmatrix.r21)+((trp1.y*rotmatrix.r22)+(trp1.z*rotmatrix.r23)),(trp1.x*rotmatrix.r31)+((trp1.y*rotmatrix.r32)+(trp1.z*rotmatrix.r33)));
            var tp2 = new Point((trp2.x*rotmatrix.r11)+(trp2.y*rotmatrix.r12)+(trp2.z*rotmatrix.r13),(trp2.x*rotmatrix.r21)+((trp2.y*rotmatrix.r22)+(trp2.z*rotmatrix.r23)),(trp2.x*rotmatrix.r31)+((trp2.y*rotmatrix.r32)+(trp2.z*rotmatrix.r33)));
            var tp3 = new Point((trp3.x*rotmatrix.r11)+(trp3.y*rotmatrix.r12)+(trp3.z*rotmatrix.r13),(trp3.x*rotmatrix.r21)+((trp3.y*rotmatrix.r22)+(trp3.z*rotmatrix.r23)),(trp3.x*rotmatrix.r31)+((trp3.y*rotmatrix.r32)+(trp3.z*rotmatrix.r33)));
            triangle(-600* (tp1.x) / (tp1.z)+450, 
                     -600* (tp1.y) / (tp1.z)+350,
                     -600* (tp2.x) / (tp2.z)+450, 
                     -600* (tp2.y) / (tp2.z)+350, 
                     -600* (tp3.x) / (tp3.z)+450, 
                     -600* (tp3.y) / (tp3.z)+350);

         
        });
        render_order = [];
        requestAnimationFrame(draw);   
    }
        var nx = [];
        var ny = [];
        var nz = [];
        var keys = {};
        var rotmatrix = new Matrix(0,0,0,0,0,0,0,0,0);
        function SetRotmatrix(cosx,sinx,cosy,siny){
            rotmatrix = new Matrix(cosx, 0, sinx, sinx*siny, cosy, -(cosx*siny), -(cosy*sinx), siny, cosx*cosy);
    }
    
    canvas.addEventListener("click", function() {
    canvas.requestPointerLock();
});

document.addEventListener("mousemove", function(e) {
    if (document.pointerLockElement === canvas) {
        roty += e.movementY * -0.002;
        rotx += e.movementX * 0.002;
    }
});
    
    document.addEventListener("keydown", function(e) {
    keys[e.key] = true;
    });
    document.addEventListener("keyup", function(e) {
    keys[e.key] = false;
    });
    function MoveCamera() {
    var speed = 10;
    if (keys[" "])     camPos.y -= speed;
    if (keys["Shift"]) camPos.y += speed;
    if (keys["a"])     camPos.x -= speed;
    if (keys["d"])     camPos.x += speed;
    if (keys["w"])     camPos.z -= speed;
    if (keys["s"])     camPos.z += speed;
}
       
       
        //init do all things u need for it to start here
            //meshes
            // Floor (2 triangles)
        Add_Triangle(-300, 200, 100,  300, 200, 100,  300, 200, 600,0,225,225);
        Add_Triangle(-300, 200, 100,  300, 200, 600, -300, 200, 600,0,225,225);

        // Back wall
        Add_Triangle(-300, -200, 600,  300, -200, 600,  300, 200, 600,0,225,0);
        Add_Triangle(-300, -200, 600,  300,  200, 600, -300, 200, 600,0,225,0);

        // Left wall
        Add_Triangle(-300, -200, 100, -300, -200, 600, -300, 200, 600,0,0,225);
        Add_Triangle(-300, -200, 100, -300,  200, 600, -300, 200, 100,0,0,225);

        // Right wall
        Add_Triangle( 300, -200, 100,  300,  200, 600,  300, -200, 600,225,225,0);
        Add_Triangle( 300, -200, 100,  300,  200, 100,  300,  200, 600,225,225,0);

        // Ceiling
        Add_Triangle(-300, -200, 100,  300, -200, 600, -300, -200, 600,225,0,225);
        Add_Triangle(-300, -200, 100,  300, -200, 100,  300, -200, 600,225,0,225);

        // A box in the middle (front face + back face)
        Add_Triangle(-50, 100, 350,   50, 100, 350,   50, 0, 350,   200, 100, 50);
        Add_Triangle(-50, 100, 350,   50,   0, 350,  -50, 0, 350,   200, 100, 50);
        Add_Triangle(-50, 100, 450,   50,   0, 450,   50, 100, 450,200,100,50);
        Add_Triangle(-50, 100, 450,  -50,   0, 450,   50,   0, 450,200,100,50);
        
        //build bsp and fundamentals for bsp
        Calc_Normals(); var bsptree = buildBSP([...Array(triangles.length).keys()]);
        var camPos = new Point(0,100,0);
        //start
        
            requestAnimationFrame(draw);
    
    </script>
